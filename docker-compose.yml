services:
  postgres:
    image: postgres:16
    container_name: lifeos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifeos
    ports:
      - "5433:5432"
    volumes:
      - lifeos-pgdata:/var/lib/postgresql/data

volumes:
  lifeos-pgdata:
